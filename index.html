<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FlyWheel Locations</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { height:100%; margin:0; font-family: Arial, system-ui, -apple-system, Segoe UI, sans-serif; background:#f3f4f6; color:#111827; }
  .app { height:100%; display:flex; flex-direction:column; }
  header { background:#0f172a; color:white; padding:12px; box-shadow:0 2px 10px rgba(0,0,0,.25); z-index:1001; }
  h1 { margin:0 0 4px; font-size:20px; }
  .meta { font-size:13px; color:#cbd5e1; margin-bottom:10px; }
  .searchRow { display:flex; gap:8px; }
  input { flex:1; border:0; border-radius:10px; padding:12px; font-size:17px; outline:none; }
  button, a.btn { border:0; border-radius:10px; padding:11px 12px; font-size:14px; font-weight:700; background:#e5e7eb; color:#111827; text-decoration:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
  button.primary, a.primary { background:#38bdf8; color:#082f49; }
  .main { flex:1; display:grid; grid-template-columns: 42% 58%; min-height:0; }
  #side { overflow:auto; padding:10px; }
  #map { min-height:400px; width:100%; height:100%; background:#dbeafe; }
  .status { font-size:13px; color:#475569; margin-bottom:8px; }
  .card { background:white; border:1px solid #e5e7eb; border-radius:12px; padding:11px; margin-bottom:9px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .card h2 { margin:0 0 6px; font-size:16px; }
  .coords { font-size:12px; color:#64748b; margin-bottom:9px; }
  .actions { display:flex; flex-wrap:wrap; gap:7px; }
  .error { background:#fee2e2; color:#7f1d1d; border:1px solid #fecaca; padding:10px; border-radius:10px; margin:8px 0; }
  .empty { color:#64748b; text-align:center; padding:20px; }
  @media (max-width: 800px) {
    .main { display:flex; flex-direction:column; }
    #map { height:48vh; min-height:320px; flex:0 0 auto; }
    #side { flex:1; min-height:0; }
  }
</style>
</head>
<body>
<div class="app">
<header>
  <h1>FlyWheel Locations</h1>
  <div class="meta"><span id="loaded">Loading...</span> • Search, select, then navigate in Google Maps</div>
  <div class="searchRow">
    <input id="search" type="search" placeholder="Search location name..." autocomplete="off">
    <button id="clearBtn">Clear</button>
    <button id="allBtn">All</button>
  </div>
</header>
<div class="main">
  <div id="map"></div>
  <section id="side">
    <div id="msg" class="status"></div>
    <div id="results"></div>
  </section>
</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  const $ = (id) => document.getElementById(id);
  let locations = [];
  let map = null;
  let markerLayer = null;
  let markersById = new Map();

  function escapeHtml(s) { return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function navUrl(l) { return `https://www.google.com/maps/dir/?api=1&destination=${l.lat},${l.lng}&travelmode=driving`; }
  function openUrl(l) { return `https://www.google.com/maps/search/?api=1&query=${l.lat},${l.lng}`; }
  function norm(s) { return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim(); }
  function getMatches(q) {
    const query = norm(q);
    if (!query) return locations.slice();
    const terms = query.split(/\s+/).filter(Boolean);
    return locations.map(l => {
      const name = norm(l.name);
      const hay = name + ' ' + norm(l.description);
      let score = 0;
      for (const t of terms) {
        if (name.startsWith(t)) score += 100;
        else if (name.includes(t)) score += 50;
        else if (hay.includes(t)) score += 10;
        else return null;
      }
      return {l, score};
    }).filter(Boolean).sort((a,b) => b.score-a.score || a.l.name.localeCompare(b.l.name)).map(x => x.l);
  }
  function showError(text) { $('msg').innerHTML = `<div class="error">${escapeHtml(text)}</div>`; }
  function renderList(list, q) {
    $('msg').textContent = q ? `${list.length} result${list.length===1?'':'s'} for "${q}"` : `Showing all ${locations.length} locations`;
    const shown = list.slice(0, 250);
    $('results').innerHTML = shown.length ? shown.map(l => `
      <div class="card">
        <h2>${escapeHtml(l.name)}</h2>
        <div class="coords">${Number(l.lat).toFixed(6)}, ${Number(l.lng).toFixed(6)}</div>
        <div class="actions">
          <button class="primary" onclick="window.flywheelSelect(${l.id})">Show on map</button>
          <a class="btn primary" href="${navUrl(l)}" target="_blank" rel="noopener">Navigate</a>
          <a class="btn" href="${openUrl(l)}" target="_blank" rel="noopener">Open in Google Maps</a>
        </div>
      </div>`).join('') : '<div class="empty">No matching locations found.</div>';
    if (list.length > 250) $('results').insertAdjacentHTML('beforeend', `<div class="status">Showing first 250 of ${list.length} matches. Keep typing to narrow it down.</div>`);
  }
  function updateMarkers(list) {
    if (!markerLayer) return;
    markerLayer.clearLayers();
    markersById.clear();
    list.forEach(l => {
      const marker = L.circleMarker([l.lat, l.lng], { radius:6, weight:2, color:'#0f172a', fillColor:'#38bdf8', fillOpacity:0.9 });
      marker.bindPopup(`<b>${escapeHtml(l.name)}</b><br>${Number(l.lat).toFixed(6)}, ${Number(l.lng).toFixed(6)}<br><br><a href="${navUrl(l)}" target="_blank">Navigate in Google Maps</a>`);
      marker.on('click', () => marker.openPopup());
      marker.addTo(markerLayer);
      markersById.set(l.id, marker);
    });
  }
  function applySearch() {
    const q = $('search').value;
    const list = getMatches(q);
    renderList(list, q);
    updateMarkers(list);
    if (list.length && q && list.length < 40) {
      try { map.fitBounds(list.map(l => [l.lat, l.lng]), {padding:[30,30], maxZoom:14}); } catch(e) {}
    }
  }
  window.flywheelSelect = function(id) {
    const l = locations.find(x => x.id === id);
    if (!l || !map) return;
    map.setView([l.lat, l.lng], 15);
    setTimeout(() => { const m = markersById.get(id); if (m) m.openPopup(); }, 100);
  };
  function init() {
    try {
      locations = JSON.parse(atob(DATA_B64));
      $('loaded').textContent = `${locations.length} locations loaded`;
    } catch (e) { showError('Location data failed to load: ' + e.message); return; }
    if (!window.L) { showError('Map library did not load. Check internet connection or CDN access.'); renderList(locations, ''); return; }
    try {
      map = L.map('map', { preferCanvas:true });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'&copy; OpenStreetMap contributors' }).addTo(map);
      markerLayer = L.layerGroup().addTo(map);
      updateMarkers(locations);
      map.fitBounds(locations.map(l => [l.lat, l.lng]), {padding:[25,25]});
      setTimeout(() => map.invalidateSize(), 250);
    } catch (e) { showError('Map failed to initialize: ' + e.message); }
    renderList(locations, '');
    $('search').addEventListener('input', applySearch);
    $('clearBtn').addEventListener('click', () => { $('search').value=''; applySearch(); $('search').focus(); });
    $('allBtn').addEventListener('click', () => { $('search').value=''; applySearch(); if(map) map.fitBounds(locations.map(l => [l.lat,l.lng]), {padding:[25,25]}); });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
